<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="example">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>example</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    flutter_soloud loads a WebAssembly module through the plugin's JS glue.
    The module must be initialized (and `Module_soloud` set to the resolved
    module object) before the Flutter app starts calling any C functions.
    Load the plugin scripts synchronously first, wait for the module to be
    ready, and only then load `flutter_bootstrap.js`.
  -->
  <script src="assets/packages/flutter_soloud/web/libflutter_soloud_plugin.js"></script>
  <script src="assets/packages/flutter_soloud/web/init_module.dart.js"></script>
  <script>
    (function () {
      function waitForModuleSoloud() {
        return new Promise(function (resolve) {
          function check() {
            var module = window.Module_soloud;
            if (module != null && typeof module === 'object' && typeof module._isInited === 'function') {
              resolve();
            } else {
              setTimeout(check, 10);
            }
          }
          check();
        });
      }
      waitForModuleSoloud().then(function () {
        var script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        document.body.appendChild(script);
      });
    })();
  </script>
</body>
</html>
